<!DOCTYPE html> 
<html> 
 
<head> 
<title>Form Validation</title> 
</head> 
 
<body> 
 
<h1>Registration Form</h1> 
 
<form onsubmit="return validateForm()">  
<input type="text" id="name" placeholder="Enter Name"><br><br>  
<input type="text" id="email" placeholder="Enter Email"><br><br> 
 
<input type="password" id="password" placeholder="Enter Password"><br><br>  
<input type="submit" value="Register"> 
 
</form> 
 
<script>  
function validateForm(){ 
 
    let name = document.getElementById("name").value;     let email = document.getElementById("email").value;     let password = document.getElementById("password").value; 
 
    if(name == ""){ 
        alert("Name is required");         return false; 
    }  
    if(email.indexOf("@") == -1){ 
        alert("Enter valid email");         return false; 
    }  
    if(password.length < 6){ 
        alert("Password must be at least 6 characters");         return false; 
    }  
    return true; 
} 
 
</script> 
 
</body> 
 
</html>
